name: Go Setup
description: Install Go
runs:
  using: "composite"
  steps:
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      id: setup-go
      with:
        go-version-file: "go.mod"
        cache-dependency-path: |
          go.sum
          tools/go.sum
    - name: Download modules
      shell: bash
      run: go mod download
