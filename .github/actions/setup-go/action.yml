name: Go Setup
description: Install Go
runs:
  using: "composite"
  steps:
    - name: Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      id: setup-go
      with:
        go-version-file: "go.mod"
        cache-dependency-path: |
          go.sum
          tools/go.sum
    - name: Download modules
      shell: bash
      run: go mod download
